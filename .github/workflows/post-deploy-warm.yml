name: Post-deploy Warm Cache

on:
  push:
    branches: [ main ]

jobs:
  warm-cache:
    name: Warm cache after deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for deploy to become healthy
        run: |
          echo "Waiting up to 5 minutes for ${SERVICE_URL} to become healthy..."
          set -e
          ATTEMPTS=30
          SLEEP=10
          OK=1
          for i in $(seq 1 $ATTEMPTS); do
            echo "Attempt $i: checking ${SERVICE_URL}/health"
            if curl -fsS --max-time 5 "${SERVICE_URL}/health" >/dev/null 2>&1; then
              echo "Service is healthy. Proceeding to warm cache."
              OK=0
              break
            fi
            sleep $SLEEP
          done
          if [ "$OK" -ne 0 ]; then
            echo "Service did not become healthy after $((ATTEMPTS * SLEEP))s - continuing to attempt warm but it may fail."
          fi

      - name: Run warm script
        env:
          SERVICE_URL: ${{ secrets.SERVICE_URL }}
          SERVICE_AUTH: ${{ secrets.SERVICE_AUTH }}
        run: |
          echo "Warming cache at ${SERVICE_URL}"
          bash scripts/warm_cache.sh
